<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quantum Void</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h1>THE VOID</h1>
        <div id="info">
            Dimensions (D): <span id="dim-count">-</span><br>
            Current Affinity Law: <br><span id="affinity-law" style="color: #f0f;">-</span><br>
            Emergent Events: <span id="event-count">0</span>
        </div>
        <div class="controls-hint">
            <strong>CLICK TO LOCK MOUSE</strong><br>
            W A S D - Move<br>
            Q / E - Down / Up<br>
            ESC - Unlock Mouse
        </div>
    </div>
    
    <!-- Three.js for Rendering the Observer's Lens -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
